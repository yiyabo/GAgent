[pytest]
testpaths = app/tests
asyncio_mode = auto
addopts = -ra --strict-markers
markers =
    asyncio: Async test marker.
    integration: Real-app integration tests using create_app() and isolated local dependencies.
    prod_smoke: Production-oriented smoke tests for startup, HTTP, and WebSocket lifecycles.
    external: Tests that require external services, credentials, or non-local infrastructure.
filterwarnings =
    ignore:Using extra keyword arguments on `Field` is deprecated.*:pydantic.warnings.PydanticDeprecatedSince20
    ignore:Pandas requires version '1.3.6' or newer of 'bottleneck'.*:UserWarning
