name: Nightly Prod Smoke

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  prod-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest-cov

      - name: Run production smoke suite
        run: |
          pytest -q app/tests -m "prod_smoke and not external" \
            --cov=app \
            --cov-report=term \
            --cov-report=xml:coverage-prod-smoke.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-prod-smoke
          path: coverage-prod-smoke.xml
